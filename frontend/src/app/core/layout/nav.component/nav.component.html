@let currentCategory = selectedCategory();
<aside class="nav" [class.nav--drawer-open]="isDrawerOpen()">
    <!-- RAIL -->
    <div class="rail">
        <div class="rail__top">
            <a class="brand" title="Home" (click)="closeDrawer()" routerLink="/">
                <img src="favicon.ico" width="30" height="30" alt="Home" />
            </a>
        </div>

        <ul class="rail__menu" role="list">
            @for (category of categories(); track $index) {
            <li>
                <a class="rail__item" [class.is-active]="currentCategory?.id === category.id" [title]="category.id"
                    (click)="selectCategory(category.id)">
                    <img class="rail__icon" aria-hidden="true" [src]="category.icon">
                </a>
            </li>
            }
        </ul>

        <div class="rail__bottom">
            <button class="rail__btn" type="button" title="Theme" (click)="toggleTheme.emit()">
                <img src="/icons/theme.png">
            </button>
            <button class="rail__btn" type="button" title="Logout" (click)="logout()">
                <img src="/icons/logout.png">
            </button>
        </div>
    </div>

    <!-- DRAWER -->
    @if (isDrawerOpen()) {
    <div class="drawer" role="navigation" aria-label="Section">
        <div class="drawer__header">
            <div class="drawer__title">
                <img [src]="currentCategory?.icon" alt="" class="drawwer__icon">
                <span class="drawer__text">{{ currentCategory?.id }}</span>
            </div>

            <button class="drawer__close" type="button" title="Close" (click)="closeDrawer()">✕</button>
        </div>

        <ul class="drawer__menu" role="list">
            @for (option of currentCategory?.options; track $index) {
            <li>
                <a class="drawer__item" [routerLink]="option.route" (click)="closeDrawer()">
                    <span>{{ option.routeName }}</span>
                </a>
            </li>
            }
        </ul>
    </div>
    }
</aside>
