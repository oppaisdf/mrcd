<h1>Padres y padrinos</h1>

<ui-accordeon title="Filtros">
    <form [formGroup]="form" class="ui-form" (ngSubmit)="loadAsync()">
        <ui-input label="nombre" type="text" [hint]="invalidName()" formControlName="name" />

        <button class="ui-button" type="submit">Buscar</button>
    </form>
</ui-accordeon>

<br>

@let _page = page();
@if(_page.items.length > 0){
<div class="ui-table-wrap">
    <table class="ui-table">
        <thead>
            <tr>
                <th>Nombre</th>
            </tr>
        </thead>
        <tbody>
            @for (parent of _page.items; track parent.id) {
            <tr>
                <td>{{parent.name}}</td>
            </tr>
            }
        </tbody>
    </table>
</div>

@if (_page.hasPrevious) {
<button class="ui-button is-ghost" (click)="changePageAsync(false)">Página anterior</button>
}
{{_page.page}}/{{_page.totalPages}}
@if(_page.hasNext){
<button class="ui-button is-ghost" (click)="changePageAsync(true)">Siguiente página</button>
}
}
